<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f3a"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="lockBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd"/>
      <stop offset="100%" style="stop-color:#b8d4f0"/>
    </linearGradient>
    <linearGradient id="shackle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#cce0f5"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- 背景：完整填充，不加圆角（macOS 系统会自动应用圆角遮罩） -->
  <rect width="1024" height="1024" rx="0" ry="0" fill="url(#bg)"/>

  <!-- 背景装饰：网格线营造科技感 -->
  <g opacity="0.06" stroke="#4a9eda" stroke-width="1.5">
    <line x1="0" y1="256" x2="1024" y2="256"/>
    <line x1="0" y1="512" x2="1024" y2="512"/>
    <line x1="0" y1="768" x2="1024" y2="768"/>
    <line x1="256" y1="0" x2="256" y2="1024"/>
    <line x1="512" y1="0" x2="512" y2="1024"/>
    <line x1="768" y1="0" x2="768" y2="1024"/>
  </g>

  <!-- 锁头主体 -->
  <g filter="url(#shadow)">
    <!-- 锁身（圆角矩形） -->
    <rect x="292" y="480" width="440" height="350" rx="56" ry="56" fill="url(#lockBody)"/>

    <!-- 锁扣（上半圆弧） -->
    <path d="M 362 490 L 362 370 A 150 150 0 0 1 662 370 L 662 490"
          fill="none"
          stroke="url(#shackle)"
          stroke-width="72"
          stroke-linecap="round"/>

    <!-- 锁孔外圆 -->
    <circle cx="512" cy="635" r="62" fill="#1a3a5c" opacity="0.9"/>

    <!-- 钥匙孔 -->
    <circle cx="512" cy="618" r="28" fill="#0d2137"/>
    <rect x="496" y="630" width="32" height="48" rx="8" fill="#0d2137"/>
  </g>

  <!-- 右下角小亮点，增加质感 -->
  <circle cx="820" cy="820" r="180" fill="white" opacity="0.02"/>
</svg>
